version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: settlement
      POSTGRES_USER: settlement
      POSTGRES_PASSWORD: settlement
    ports:
      - "5432:5432"

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U settlement -d settlement" ]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    image: nuts/settlement:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/settlement
      - SPRING_DATASOURCE_USERNAME=settlement
      - SPRING_DATASOURCE_PASSWORD=settlement
    ports:
      - "8080:8080"

volumes:
  db-data:
